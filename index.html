<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Генератор шифру Білл Шифр</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>

<header>
    <h1><i class="fas fa-eye"></i> Генератор чисел</h1>
</header>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
    Ваш браузер не підтримує аудіо.
    </audio>

    <div class="container">
    <img src="https://cdn.nur.kz/images/1200x675/888b7f9a24e1e73c.jpeg?version=2"  width="320">
 
    <input type="text" id="textInput" placeholder="Введіть речення">
    <input type="number" id="min" placeholder="Мінімум">
    <input type="number" id="max" placeholder="Максимум">
    <input type="number" id="count" placeholder="Кількість чисел">

    
    <div class="buttons">
        <button onclick="generate()"><i class="fas fa-play"></i> Генерувати</button>
        <button onclick="clearInputs()"><i class="fas fa-eraser"></i> Очистити поля</button>
            
        <button onclick="playMusic()"><i class="fas fa-headphones"></i> Увімкнути музику</button>
        <button onclick="pauseMusic()"><i class="fas fa-ban"></i> Вимкнути музику</button>
    </div>
</div>

<h2>Результат:</h2>
<p id="result"></p>

<footer>
    <p>&copy; 2026 <a href="#">Тетяна Туренко</a>. БСД-23. <i class="fas fa-eye"></i></p>
</footer>

<script src="script.js"></script>
</body>
</html>
